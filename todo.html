<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel To-Do List</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ My To-Do List</h1>
            <p class="subtitle">Stay organized with pastel style</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..."
                class="todo-input"
            >
            <button id="addBtn" class="add-btn">+ Add Task</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="stats">
            <p id="stats">0 tasks • 0 completed</p>
            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
